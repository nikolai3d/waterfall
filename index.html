<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waterfall — MLS-MPM fluid in WebGL2</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #04060a; }
    #view { width: 100%; height: 100%; display: block; cursor: grab; }
    #view:active { cursor: grabbing; }
    .hud {
      position: fixed; color: #9fb4c4; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }
    #title { top: 14px; left: 16px; }
    #title b { color: #d7e6f2; font-size: 14px; font-weight: 600; }
    #stats { bottom: 14px; left: 16px; }
    #help { bottom: 14px; right: 16px; text-align: right; }
    #err {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      max-width: 40em; padding: 16px 20px; background: #2a1215; color: #ffb4b4;
      border: 1px solid #5c2b30; border-radius: 8px;
      font: 13px/1.6 ui-monospace, Menlo, monospace; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="title" class="hud"><b>waterfall</b> · MLS-MPM fluid, simulated entirely on the GPU (WebGL2)</div>
  <div id="stats" class="hud">…</div>
  <div id="help" class="hud">drag — orbit · wheel — zoom · space — pause · f — surface/particles</div>
  <div id="err"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
