<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waterfall — MLS-MPM fluid in WebGL2</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #04060a; }
    #view { width: 100%; height: 100%; display: block; cursor: grab; }
    #view:active { cursor: grabbing; }
    .hud {
      position: fixed; color: #9fb4c4; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }
    #title { top: 14px; left: 16px; }
    #title b { color: #d7e6f2; font-size: 14px; font-weight: 600; }
    #stats { bottom: 14px; left: 16px; }
    #help { bottom: 14px; right: 16px; text-align: right; }
    #panel {
      top: 14px; right: 16px; pointer-events: auto;
      padding: 8px 10px; background: rgba(6, 11, 17, .55);
      border: 1px solid rgba(159, 180, 196, .18); border-radius: 8px;
    }
    #panel .row { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
    #panel .row + .row { margin-top: 4px; }
    #panel .lbl { margin-right: 4px; opacity: .8; }
    #panel .note { margin-top: 5px; text-align: right; opacity: .55; font-size: 11px; }
    #panel button {
      font: inherit; color: inherit; background: transparent;
      border: 1px solid rgba(159, 180, 196, .3); border-radius: 999px;
      padding: 1px 8px; cursor: pointer;
    }
    #panel button:hover { border-color: rgba(215, 230, 242, .7); }
    #panel button.on { background: #2b4a63; color: #d7e6f2; border-color: #6d90ac; }
    #drag {
      display: none; padding: 2px 8px; color: #d7e6f2;
      background: rgba(6, 11, 17, .7); border: 1px solid rgba(159, 180, 196, .25);
      border-radius: 6px; white-space: nowrap;
    }
    #err {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      max-width: 40em; padding: 16px 20px; background: #2a1215; color: #ffb4b4;
      border: 1px solid #5c2b30; border-radius: 8px;
      font: 13px/1.6 ui-monospace, Menlo, monospace; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="title" class="hud"><b>waterfall</b> · MLS-MPM fluid, simulated entirely on the GPU (WebGPU / WebGL2)</div>
  <div id="stats" class="hud">…</div>
  <div id="panel" class="hud">
    <div class="row"><span class="lbl">grid</span><button data-g="32">32³</button><button data-g="64">64³</button><button data-g="96">96³</button><button data-g="128">128³</button></div>
    <div class="row"><span class="lbl">particles</span><button data-p="128">128²</button><button data-p="192">192²</button><button data-p="256">256²</button><button data-p="384">384²</button><button data-p="512">512²</button></div>
    <div class="row"><span class="lbl">render</span><button data-r="ssf">surface</button><button data-r="points">particles</button><button data-r="volume">volume</button><button data-r="voxel">voxel</button><button data-r="aniso">aniso</button><button data-r="mesh">mesh</button><button data-r="trace">trace</button></div>
    <div class="row"><span class="lbl">spray</span><button data-spray="0">0</button><button data-spray="0.5">0.5</button><button data-spray="1">1</button><button data-spray="2">2</button></div>
    <div class="note">changing grid or particles restarts the water</div>
  </div>
  <div id="drag" class="hud"></div>
  <div id="help" class="hud">drag rock — move it · drag — orbit · wheel — zoom · space — pause · f — cycle renderer</div>
  <div id="err"></div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
